<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applicatiebibliotheek | Dalton Den Haag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/1fdf65b469.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #f3efe8;
      --bg-strong: #ece5dc;
      --panel: rgba(255, 252, 248, 0.96);
      --panel-strong: #fffdf9;
      --line: rgba(29, 55, 78, 0.14);
      --text: #1d374e;
      --muted: #6f7d8b;
      --primary: #18a7df;
      --primary-dark: #116e95;
      --ink: #12314a;
      --brick: #b56f59;
      --sand: #d9c5ae;
      --shadow: 0 2px 14px rgba(34, 42, 53, 0.09);
      --shadow-hover: 0 18px 42px rgba(34, 42, 53, 0.13);
      --radius: 14px;
      --radius-soft: 22px;
      --sidebar-w: 76px;
      --topbar-h: 66px;
      --card-w: 158px;
      --card-h: 165px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Manrope", sans-serif;
      background:
        linear-gradient(90deg, rgba(18, 49, 74, 0.04) 0, rgba(18, 49, 74, 0.04) 1px, transparent 1px, transparent 100px),
        linear-gradient(rgba(18, 49, 74, 0.04) 0, rgba(18, 49, 74, 0.04) 1px, transparent 1px, transparent 100px),
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 36%),
        linear-gradient(160deg, var(--bg), var(--bg-strong));
      background-size: 100px 100px, 100px 100px, 100% 100%, 100% 100%;
      color: var(--text);
    }

    body {
      overflow: hidden;
    }

    .app-shell {
      height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-rows: var(--topbar-h) 1fr;
      grid-template-areas:
        "topbar topbar"
        "sidebar main";
    }

    /* ── TOPBAR ── */
    .topbar {
      grid-area: topbar;
      height: var(--topbar-h);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0)),
        linear-gradient(130deg, var(--ink) 0%, #1e4a6a 52%, var(--primary-dark));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 0 14px;
      box-shadow: 0 2px 18px rgba(18, 49, 74, 0.24);
      z-index: 5;
      position: relative;
      overflow: hidden;
    }

    .topbar::after {
      content: "";
      position: absolute;
      right: -50px;
      top: -50px;
      width: 170px;
      height: 170px;
      background: linear-gradient(135deg, rgba(217, 197, 174, 0.20), rgba(181, 111, 89, 0.10));
      transform: rotate(45deg);
      pointer-events: none;
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .burger {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.11);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .burger:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .topbar-title {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .topbar-eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.60rem;
      opacity: 0.62;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .topbar h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.42rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .school-badge {
      display: flex;
      align-items: center;
      gap: 9px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 9px;
      padding: 6px 13px;
    }

    .school-badge-name {
      font-size: 0.80rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      opacity: 0.90;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--brick), #d4896f);
      color: #fff;
      font-weight: 800;
      font-size: 0.80rem;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .icon-round {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.10);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s ease;
    }

    .icon-round:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      grid-area: sidebar;
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding-top: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .side-btn {
      width: 58px;
      height: 54px;
      border: none;
      background: transparent;
      color: rgba(29, 55, 78, 0.35);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 1.15rem;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .side-btn .side-label {
      font-size: 0.60rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }

    .side-btn.active,
    .side-btn:hover {
      color: var(--brick);
      background: rgba(181, 111, 89, 0.10);
    }

    .side-divider {
      width: 32px;
      height: 1px;
      background: var(--line);
      margin: 6px 0;
    }

    /* ── MAIN ── */
    .main {
      grid-area: main;
      overflow: auto;
      padding: 24px 28px 32px 28px;
    }

    .content-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .content-head-left {
      display: flex;
      flex-direction: column;
    }

    .content-head-eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.64rem;
      color: var(--brick);
      font-weight: 700;
      margin-bottom: 5px;
    }

    .content-head h2 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.01em;
      color: var(--ink);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .search {
      position: relative;
      width: min(440px, 54vw);
      min-width: 220px;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.82rem;
      pointer-events: none;
    }

    .search input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      border-radius: 8px;
      padding: 0 36px 0 34px;
      font: inherit;
      font-size: 0.87rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(24, 167, 223, 0.10);
    }

    .search:focus-within .search-icon {
      color: var(--primary);
    }

    .search input::placeholder {
      color: var(--sand);
    }

    .search button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: var(--sand);
      font-size: 0.87rem;
      cursor: pointer;
    }

    .tool-btn,
    .view-toggle button {
      height: 36px;
      min-width: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 11px;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
      position: relative;
    }

    .tool-btn:hover,
    .view-toggle button:hover {
      border-color: rgba(29, 55, 78, 0.28);
      color: var(--brick);
    }

    .view-toggle {
      display: inline-flex;
    }

    .view-toggle button:first-child {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }

    .view-toggle button:last-child {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
      border-left: none;
    }

    .view-toggle button.is-active {
      color: var(--primary-dark);
      background: rgba(24, 167, 223, 0.08);
      border-color: rgba(24, 167, 223, 0.28);
    }

    .badge {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--brick);
      color: #fff;
      font-size: 0.67rem;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
      gap: 18px 16px;
      align-items: start;
    }

    .grid.list {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    /* ── APP CARDS ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-soft);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 14px 16px;
      min-height: var(--card-h);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      touch-action: none;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--brick), var(--primary));
      border-radius: var(--radius-soft) var(--radius-soft) 0 0;
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-placeholder {
      opacity: 0.30;
      background: rgba(24, 167, 223, 0.05);
      border: 2px dashed rgba(24, 167, 223, 0.38);
      box-shadow: none;
    }

    .card.is-drag-source {
      opacity: 0.01;
    }

    .drag-clone {
      position: fixed;
      z-index: 30;
      margin: 0;
      opacity: 0.96;
      transform: rotate(1.2deg) scale(1.03);
      box-shadow: 0 24px 44px rgba(18, 49, 74, 0.22);
      border-color: rgba(24, 167, 223, 0.34);
      pointer-events: none;
      transition: none;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(29, 55, 78, 0.22);
    }

    .card:focus-visible {
      outline: 3px solid rgba(24, 167, 223, 0.28);
      outline-offset: 2px;
    }

    .card-thumb {
      width: 88px;
      height: 88px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .thumb-fallback {
      width: 76px;
      height: 76px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 700;
      font-size: 1.25rem;
      font-family: "Cormorant Garamond", serif;
      text-align: center;
      line-height: 1;
      padding: 10px;
    }

    .card-name {
      font-size: 0.84rem;
      line-height: 1.25;
      text-align: center;
      color: var(--ink);
      font-weight: 700;
      min-height: 2.2em;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: "Manrope", sans-serif;
    }

    .card-subtitle {
      display: none;
    }

    .card *,
    .thumb-fallback {
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    /* ── LIST VIEW ── */
    .grid.list .card {
      min-height: auto;
      padding: 13px 16px;
      flex-direction: row;
      justify-content: flex-start;
      gap: 16px;
      align-items: center;
      border-radius: var(--radius);
    }

    .grid.list .card::before {
      width: 3px;
      height: auto;
      top: 0;
      bottom: 0;
      right: auto;
      left: 0;
      border-radius: var(--radius) 0 0 var(--radius);
      opacity: 1;
    }

    .grid.list .card:hover::before {
      opacity: 1;
    }

    .grid.list .card-thumb {
      width: 50px;
      height: 50px;
      margin-bottom: 0;
    }

    .grid.list .thumb-fallback {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      font-size: 0.9rem;
    }

    .grid.list .card-name {
      min-height: auto;
      text-align: left;
      justify-content: flex-start;
      font-size: 0.91rem;
    }

    .grid.list .card-subtitle {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 500;
    }

    .empty {
      display: none;
      padding: 48px 12px;
      color: var(--muted);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.3rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      right: 28px;
      bottom: 24px;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, var(--brick), #d4896f);
      color: #fff;
      box-shadow: 0 14px 28px rgba(181, 111, 89, 0.32);
      font-size: 1.4rem;
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 3;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .fab:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 18px 36px rgba(181, 111, 89, 0.40);
    }

    /* ── MAGIC SPARKLE ── */
    @keyframes spark-burst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      70% { opacity: 0.85; }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0.05) rotate(var(--r, 140deg));
      }
    }

    @keyframes spark-ring {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    @keyframes spark-glow-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(181,111,89,0.45); transform: scale(1); }
      50%  { box-shadow: 0 0 0 8px rgba(181,111,89,0.0); transform: scale(1.04); }
      100% { box-shadow: 0 0 0 0 rgba(181,111,89,0); transform: scale(1); }
    }

    .spark-particle {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      animation: spark-burst var(--dur) cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    .spark-particle.dot {
      border-radius: 50%;
      background: var(--color);
      box-shadow: 0 0 var(--glow) var(--color), 0 0 calc(var(--glow) * 2) var(--color);
    }

    .spark-particle.star {
      background: var(--color);
      filter: drop-shadow(0 0 3px var(--color));
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    .spark-particle.line {
      border-radius: 99px;
      background: linear-gradient(90deg, var(--color), transparent);
      box-shadow: 0 0 4px var(--color);
      transform-origin: left center;
    }

    .spark-ring-el {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      border-radius: 50%;
      border: 1.5px solid var(--ring-color, rgba(181,111,89,0.7));
      animation: spark-ring 0.48s ease-out forwards;
    }

    .card-grab-flash {
      animation: spark-glow-pulse 0.35s ease-out;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .app-shell {
        grid-template-columns: 1fr;
        grid-template-rows: var(--topbar-h) auto 1fr;
        grid-template-areas:
          "topbar"
          "sidebar"
          "main";
        height: auto;
        min-height: 100vh;
      }

      .sidebar {
        flex-direction: row;
        justify-content: center;
        padding: 10px;
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .main {
        overflow: visible;
      }

      .content-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }

      .search {
        width: 100%;
      }

      .topbar {
        padding-right: 10px;
      }

      .school-badge {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <button class="burger" type="button" aria-label="Menu">
          <i class="fa-solid fa-folder-open"></i>
        </button>
        <div class="topbar-title">
          <div class="topbar-eyebrow">Dalton Den Haag</div>
          <h1>Applicatiebibliotheek</h1>
        </div>
      </div>
      <div class="topbar-right">
        <div class="school-badge">
          <span class="school-badge-name">Dalton Den Haag</span>
        </div>
        <div id="userAvatar" class="avatar" aria-label="Gebruiker">MF</div>
        <button class="icon-round" type="button" aria-label="Apps menu">
          <i class="fa-solid fa-grip"></i>
        </button>
      </div>
    </header>

    <aside class="sidebar" aria-label="Navigatie">
      <button class="side-btn active" type="button" aria-label="Favorieten">
        <i class="fa-regular fa-paper-plane"></i>
        <span class="side-label">Apps</span>
      </button>
      <button class="side-btn" type="button" aria-label="Collecties">
        <i class="fa-regular fa-clone"></i>
        <span class="side-label">Sets</span>
      </button>
      <div class="side-divider"></div>
      <button class="side-btn" type="button" aria-label="Instellingen">
        <i class="fa-solid fa-gear"></i>
        <span class="side-label">Config</span>
      </button>
    </aside>

    <main class="main">
      <div class="content-head">
        <div class="content-head-left">
          <div class="content-head-eyebrow">Favorieten</div>
          <h2>Applicaties</h2>
        </div>
        <div class="toolbar">
          <label class="search" aria-label="Zoeken">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input id="searchInput" type="search" placeholder="Zoeken…">
            <button id="clearSearch" type="button" aria-label="Zoeken wissen">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </label>
          <div class="view-toggle" aria-label="Weergave wisselen">
            <button id="gridViewBtn" class="is-active" type="button" title="Rasterweergave">
              <i class="fa-solid fa-grip"></i>
              <span>Raster</span>
            </button>
            <button id="listViewBtn" type="button" title="Lijstweergave">
              <i class="fa-solid fa-list"></i>
              <span>Lijst</span>
            </button>
          </div>
          <button class="tool-btn" type="button" title="Filter">
            <i class="fa-solid fa-sliders"></i>
            <span>Filter</span>
            <span class="badge">1</span>
          </button>
          <button id="refreshBtn" class="tool-btn" type="button" title="Verversen">
            <i class="fa-solid fa-rotate-right"></i>
            <span>Ververs</span>
          </button>
        </div>
      </div>

      <section id="cardsGrid" class="grid" aria-live="polite"></section>
      <div id="emptyState" class="empty">Geen applicaties gevonden voor deze zoekopdracht.</div>
    </main>
  </div>

  <button class="fab" type="button" title="Snel toevoegen" aria-label="Snel toevoegen">
    <i class="fa-solid fa-plus"></i>
  </button>

  <script>
    const apps = [

    /* ── SPARKLE ENGINE ── */
    const SPARK_PALETTE = [
      { color: '#f5a623', glow: '7px' },
      { color: '#ffd166', glow: '6px' },
      { color: '#b56f59', glow: '5px' },
      { color: '#e8a87c', glow: '5px' },
      { color: '#18a7df', glow: '6px' },
      { color: '#67d2d8', glow: '5px' },
      { color: '#fff8ee', glow: '4px' },
    ];

    function spawnSpark(x, y, size, type, palette, tx, ty, dur, rot) {
      const el = document.createElement('div');
      el.className = `spark-particle ${type}`;
      const { color, glow } = palette;
      el.style.cssText = [
        `left:${x - size / 2}px`,
        `top:${y - size / 2}px`,
        `width:${size}px`,
        `height:${size}px`,
        `--tx:${tx}px`,
        `--ty:${ty}px`,
        `--dur:${dur}ms`,
        `--r:${rot}deg`,
        `--color:${color}`,
        `--glow:${glow}`,
      ].join(';');
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove(), { once: true });
    }

    function spawnSparkRing(x, y, size, color) {
      const ring = document.createElement('div');
      ring.className = 'spark-ring-el';
      ring.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;--ring-color:${color}`;
      document.body.appendChild(ring);
      ring.addEventListener('animationend', () => ring.remove(), { once: true });
    }

    function spawnSparkles(x, y) {
      // Two expanding rings
      spawnSparkRing(x, y, 52, 'rgba(181,111,89,0.65)');
      setTimeout(() => spawnSparkRing(x, y, 80, 'rgba(24,167,223,0.40)'), 80);

      const count = 22;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.7;
        const dist  = 38 + Math.random() * 72;
        const tx    = Math.cos(angle) * dist;
        const ty    = Math.sin(angle) * dist;
        const pal   = SPARK_PALETTE[Math.floor(Math.random() * SPARK_PALETTE.length)];
        const dur   = 380 + Math.random() * 380;
        const rot   = 80 + Math.random() * 280;

        // Mix of shapes
        const roll = Math.random();
        if (roll < 0.55) {
          // dot
          const size = 2.5 + Math.random() * 5;
          spawnSpark(x, y, size, 'dot', pal, tx, ty, dur, rot);
        } else if (roll < 0.80) {
          // star
          const size = 5 + Math.random() * 6;
          spawnSpark(x, y, size, 'star', pal, tx, ty, dur + 80, rot);
        } else {
          // short line streak
          const w = 8 + Math.random() * 14;
          const h = 2 + Math.random() * 2;
          const el = document.createElement('div');
          el.className = 'spark-particle line';
          el.style.cssText = [
            `left:${x}px`, `top:${y}px`,
            `width:${w}px`, `height:${h}px`,
            `--tx:${tx}px`, `--ty:${ty}px`,
            `--dur:${Math.round(dur)}ms`,
            `--r:${rot}deg`,
            `--color:${pal.color}`,
            `--glow:${pal.glow}`,
            `transform-origin:left center`,
            `transform:rotate(${Math.atan2(ty, tx) * 180 / Math.PI}deg)`,
          ].join(';');
          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove(), { once: true });
        }
      }
    }

    let trailThrottle = 0;
    function spawnTrailSpark(x, y) {
      const now = Date.now();
      if (now - trailThrottle < 55) return;
      trailThrottle = now;
      const pal  = SPARK_PALETTE[Math.floor(Math.random() * 4)]; // warmer colours only
      const size = 2 + Math.random() * 3;
      const tx   = (Math.random() - 0.5) * 18;
      const ty   = (Math.random() - 0.5) * 18;
      const dur  = 280 + Math.random() * 200;
      spawnSpark(x, y, size, 'dot', pal, tx, ty, dur, 0);
    }

    function loadStoredOrder() {
      const stored = localStorage.getItem(orderStorageKey);
      if (!stored) {
        return;
      }

      try {
        const ids = JSON.parse(stored);
        const appMap = new Map(orderedApps.map((app) => [app.id, app]));
        const reordered = ids.map((id) => appMap.get(id)).filter(Boolean);
        const leftovers = orderedApps.filter((app) => !ids.includes(app.id));
        orderedApps = [...reordered, ...leftovers];
      } catch (_error) {
        localStorage.removeItem(orderStorageKey);
      }
    }

    function saveStoredOrder() {
      localStorage.setItem(orderStorageKey, JSON.stringify(orderedApps.map((app) => app.id)));
    }

    function mergeVisibleOrder(visibleIds) {
      const visibleSet = new Set(visibleIds);
      const appMap = new Map(orderedApps.map((app) => [app.id, app]));
      const visibleApps = visibleIds.map((id) => appMap.get(id)).filter(Boolean);
      let pointer = 0;

      orderedApps = orderedApps.map((app) => {
        if (!visibleSet.has(app.id)) {
          return app;
        }

        const nextApp = visibleApps[pointer];
        pointer += 1;
        return nextApp || app;
      });
    }

    function getFilteredApps(query) {
      return orderedApps.filter((app) => {
        const haystack = `${app.name} ${app.subtitle || ""} ${app.url}`.toLowerCase();
        return haystack.includes(query);
      });
    }

    function syncOrderFromDom() {
      const ids = Array.from(cardsGrid.querySelectorAll(".card")).map((card) => card.dataset.id);
      if (!ids.length) {
        return;
      }

      mergeVisibleOrder(ids);
      saveStoredOrder();
    }

    function finishDrag(commitOrder) {
      if (!dragState) {
        return;
      }

      const { source, clone, placeholder, pointerId } = dragState;

      document.removeEventListener("pointermove", onPointerMove);
      document.removeEventListener("pointerup", onPointerUp);
      document.removeEventListener("pointercancel", onPointerUp);

      if (source) {
        source.classList.remove("is-drag-source");
        if (source.releasePointerCapture && pointerId !== null) {
          try {
            source.releasePointerCapture(pointerId);
          } catch (_error) {
          }
        }
      }

      if (clone) {
        clone.remove();
      }

      if (placeholder && placeholder.parentNode) {
        placeholder.parentNode.replaceChild(source, placeholder);
      }

      if (commitOrder) {
        suppressClickUntil = Date.now() + 250;
        syncOrderFromDom();
      } else {
        filterCards();
      }

      dragState = null;
    }

    function updateClonePosition(clientX, clientY) {
      if (!dragState || !dragState.clone) {
        return;
      }

      const { clone, offsetX, offsetY } = dragState;
      clone.style.left = `${clientX - offsetX}px`;
      clone.style.top = `${clientY - offsetY}px`;
      clone.style.width = `${dragState.width}px`;
      clone.style.height = `${dragState.height}px`;
    }

    function startDrag(clientX, clientY) {
      if (!dragState || dragState.dragging) {
        return;
      }

      const { source } = dragState;
      const rect = source.getBoundingClientRect();
      const clone = source.cloneNode(true);
      const placeholder = document.createElement(source.tagName.toLowerCase());

      clone.classList.add("drag-clone");
      clone.removeAttribute("href");
      clone.style.width = `${rect.width}px`;
      clone.style.height = `${rect.height}px`;

      placeholder.className = `${source.className} card-placeholder`;
      placeholder.removeAttribute("href");
      placeholder.setAttribute("aria-hidden", "true");
      placeholder.innerHTML = "";

      source.classList.add("is-drag-source");
      source.parentNode.replaceChild(placeholder, source);
      document.body.appendChild(clone);

      // ✨ Magic spark explosion on grab
      spawnSparkles(clientX, clientY);

      dragState.dragging = true;
      dragState.clone = clone;
      dragState.placeholder = placeholder;
      dragState.width = rect.width;
      dragState.height = rect.height;
      updateClonePosition(clientX, clientY);
    }

    function getInsertionTarget(clientX, clientY) {
      const cards = Array.from(cardsGrid.querySelectorAll(".card")).filter((card) => {
        return card !== dragState.source && !card.classList.contains("is-drag-source");
      });

      for (const card of cards) {
        const rect = card.getBoundingClientRect();
        const isWithinRow = clientY >= rect.top && clientY <= rect.bottom;
        const beforeCenter = clientX < rect.left + rect.width / 2;

        if (isWithinRow && beforeCenter) {
          return { type: "before", element: card };
        }

        if (isWithinRow && clientX <= rect.right) {
          return { type: "after", element: card };
        }

        if (clientY < rect.top) {
          return { type: "before", element: card };
        }
      }

      return null;
    }

    function movePlaceholder(clientX, clientY) {
      if (!dragState || !dragState.placeholder) {
        return;
      }

      const target = getInsertionTarget(clientX, clientY);
      const placeholder = dragState.placeholder;

      if (!target) {
        cardsGrid.appendChild(placeholder);
        return;
      }

      if (target.type === "before") {
        cardsGrid.insertBefore(placeholder, target.element);
      } else {
        cardsGrid.insertBefore(placeholder, target.element.nextSibling);
      }
    }

    function onPointerMove(event) {
      if (!dragState) {
        return;
      }

      const dx = event.clientX - dragState.startX;
      const dy = event.clientY - dragState.startY;
      const moved = Math.hypot(dx, dy);

      if (!dragState.dragging && moved > 6) {
        startDrag(event.clientX, event.clientY);
      }

      if (!dragState.dragging) {
        return;
      }

      dragState.hasMoved = true;
      updateClonePosition(event.clientX, event.clientY);
      movePlaceholder(event.clientX, event.clientY);
      // ✨ Glitter trail while dragging
      spawnTrailSpark(event.clientX, event.clientY);
    }

    function onPointerUp() {
      if (!dragState) {
        return;
      }

      finishDrag(Boolean(dragState.dragging && dragState.hasMoved));
    }

    function onCardPointerDown(event) {
      if (event.button !== 0 || cardsGrid.classList.contains("list")) {
        return;
      }

      event.preventDefault();

      const source = event.currentTarget;

      // ✨ Brief glow-pulse on the card when grabbed
      source.classList.remove("card-grab-flash");
      void source.offsetWidth; // reflow to restart animation
      source.classList.add("card-grab-flash");
      source.addEventListener("animationend", () => source.classList.remove("card-grab-flash"), { once: true });

      dragState = {
        source,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        offsetX: event.clientX - source.getBoundingClientRect().left,
        offsetY: event.clientY - source.getBoundingClientRect().top,
        dragging: false,
        hasMoved: false,
        clone: null,
        placeholder: null,
        suppressClick: false
      };

      if (source.setPointerCapture) {
        try {
          source.setPointerCapture(event.pointerId);
        } catch (_error) {
        }
      }

      document.addEventListener("pointermove", onPointerMove);
      document.addEventListener("pointerup", onPointerUp);
      document.addEventListener("pointercancel", onPointerUp);
    }

    function onCardClick(event) {
      if (Date.now() < suppressClickUntil) {
        event.preventDefault();
        event.stopPropagation();
      }
    }

    function renderCards(items) {
      cardsGrid.innerHTML = "";
      items.forEach((app) => cardsGrid.appendChild(createCard(app)));
      emptyState.style.display = items.length ? "none" : "block";
    }

    function filterCards() {
      const query = searchInput.value.trim().toLowerCase();
      renderCards(getFilteredApps(query));
    }

    function setView(mode) {
      const isList = mode === "list";
      cardsGrid.classList.toggle("list", isList);
      gridViewBtn.classList.toggle("is-active", !isList);
      listViewBtn.classList.toggle("is-active", isList);
      localStorage.setItem(viewStorageKey, mode);
    }

    searchInput.addEventListener("input", filterCards);
    clearSearch.addEventListener("click", () => {
      searchInput.value = "";
      filterCards();
      searchInput.focus();
    });

    gridViewBtn.addEventListener("click", () => setView("grid"));
    listViewBtn.addEventListener("click", () => setView("list"));
    refreshBtn.addEventListener("click", () => window.location.reload());

    loadStoredOrder();
    filterCards();
    setView(localStorage.getItem(viewStorageKey) || "grid");
  </script>
</body>
</html>
